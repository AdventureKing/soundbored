services:
  tunnel:
    container_name: cloudflared-beebot
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file: 
      - stack.env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - default

  soundbored:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - /mnt/media/soundboard:/app/priv/static/uploads
    tmpfs:
      - /tmp/mix_pubsub:mode=0777
    user: "1000:1000"
    read_only: true
    environment:
      TMPDIR: /tmp/mix_pubsub
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      PHX_HOST: beebot.win
      SCHEME: https
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
      AUTO_JOIN: ${AUTO_JOIN}
      SOUNDBOARD_REQUIRED_GUILD_ID: ${SOUNDBOARD_REQUIRED_GUILD_ID}
      SOUNDBOARD_ALLOWED_ROLE_IDS: ${SOUNDBOARD_ALLOWED_ROLE_IDS}
      SOUNDBOARD_SETTINGS_PANEL_ROLE_IDS: ${SOUNDBOARD_SETTINGS_PANEL_ROLE_IDS}
